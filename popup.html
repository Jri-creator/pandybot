<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PandyBot</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111318;
      --surface: #1a1d24;
      --surface2: #22262f;
      --border: rgba(255,255,255,0.08);
      --text: #e8eaf0;
      --muted: #7a7f8e;
      --accent: #00a0ee;
      --discord: #5865F2;
      --success: #23d18b;
      --error: #f28779;
    }

    body {
      width: 280px;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 13px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .header-logo {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      flex-shrink: 0;
    }

    .header-title {
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
    }

    .header-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    .status-dot.active { background: var(--success); box-shadow: 0 0 0 3px rgba(35,209,139,0.2); }
    .status-dot.error  { background: var(--error); }

    .status-text { color: var(--muted); }

    .section {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .section-label {
      font-size: 10.5px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .field {
      margin-bottom: 10px;
    }

    .field label {
      display: block;
      font-size: 11.5px;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .field input[type="url"],
    .field input[type="text"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: monospace;
      font-size: 11px;
      padding: 7px 10px;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(0,160,238,0.2);
    }


    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 9px 14px;
      width: 100%;
      transition: all 0.15s;
    }

    .btn-save {
      background: var(--accent);
      color: white;
      box-shadow: 0 2px 10px rgba(0,160,238,0.3);
    }

    .btn-save:hover { background: #0088cc; }

    .toast {
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 500;
      text-align: center;
      display: none;
    }

    .toast.show { display: block; }
    .toast.success { color: var(--success); background: rgba(35,209,139,0.1); }
    .toast.error { color: var(--error); background: rgba(242,135,121,0.1); }

    .open-pandora {
      padding: 14px 16px;
      text-align: center;
    }

    .open-pandora a {
      color: var(--accent);
      font-size: 12px;
      text-decoration: none;
      font-weight: 500;
    }

    .open-pandora a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-logo">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" stroke="white" stroke-width="1.5" fill="none"/>
        <path d="M8 9.5C8 8.67 8.67 8 9.5 8S11 8.67 11 9.5 10.33 11 9.5 11 8 10.33 8 9.5zM13 9.5C13 8.67 13.67 8 14.5 8S16 8.67 16 9.5 15.33 11 14.5 11 13 10.33 13 9.5z" fill="white"/>
        <path d="M8.5 14.5s.8 1.5 3.5 1.5 3.5-1.5 3.5-1.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div>
      <div class="header-title">PandyBot</div>
      <div class="header-sub">Pandora → Discord</div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span class="status-text" id="status-text">Loading…</span>
  </div>

  <div class="section">
    <div class="section-label">Discord Settings</div>

    <div class="field">
      <label>Webhook URL</label>
      <input type="url" id="webhookUrl" placeholder="https://discord.com/api/webhooks/…" />
    </div>
  </div>

  <div class="section">
    <button class="btn btn-save" id="save-btn">Save Settings</button>
  </div>

  <div class="toast" id="toast"></div>

  <div class="open-pandora">
    <a href="https://www.pandora.com" target="_blank">Open Pandora ↗</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
